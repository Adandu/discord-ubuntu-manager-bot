<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DiscoBunty Login</title>
    <style>
        body {
            background: #300a24;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
        }
        form {
            background: #2b2d31;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 300px;
        }
        h2 { color: #E95420; text-align: center; margin-top: 0; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: none;
            background: #1e1f22;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .error {
            background: rgba(218, 55, 60, 0.2);
            border: 1px solid #da373c;
            color: #da373c;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <form method="post" action="/login">
        <h2>DiscoBunty Login</h2>
        {% if error %}
        <div class="error">
            {% if error == 'ratelimit' %}Too many attempts. Please wait a moment.
            {% elif error == 'no_pass' %}No password configured.
            {% else %}Invalid password.{% endif %}
        </div>
        {% endif %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="password" name="password" placeholder="Password" required autofocus>
        <button type="submit">Login</button>
    </form>
</body>
</html>
