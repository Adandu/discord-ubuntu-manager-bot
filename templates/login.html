<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoBunty — Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="shortcut icon" href="/static/logo.svg">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" crossorigin="anonymous" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#743500",
                        "surface-variant": "#33353a",
                        "on-primary-fixed": "#000569",
                        "on-secondary-fixed": "#3a0b00",
                        "error": "#ffb4ab",
                        "tertiary": "#ffb689",
                        "tertiary-fixed": "#ffdbc8",
                        "on-surface": "#e2e2e8",
                        "error-container": "#93000a",
                        "surface-tint": "#bec2ff",
                        "inverse-on-surface": "#2e3035",
                        "tertiary-container": "#bb5a00",
                        "on-primary-container": "#fffdff",
                        "on-error": "#690005",
                        "outline": "#8f8fa0",
                        "surface-dim": "#111318",
                        "primary-fixed": "#e0e0ff",
                        "primary-fixed-dim": "#bec2ff",
                        "surface-container-low": "#191c20",
                        "primary-container": "#5865f2",
                        "secondary-fixed": "#ffdbd0",
                        "primary": "#bec2ff",
                        "on-tertiary": "#512300",
                        "surface-container-lowest": "#0c0e13",
                        "background": "#111318",
                        "outline-variant": "#454655",
                        "on-primary-fixed-variant": "#222fc2",
                        "secondary-fixed-dim": "#ffb59e",
                        "surface-bright": "#37393e",
                        "secondary": "#ffb59e",
                        "inverse-surface": "#e2e2e8",
                        "surface-container": "#1d2024",
                        "on-tertiary-fixed": "#311300",
                        "secondary-container": "#c33900",
                        "surface-container-highest": "#33353a",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#ffe7e0",
                        "tertiary-fixed-dim": "#ffb689",
                        "on-primary": "#000da4",
                        "on-surface-variant": "#c6c5d7",
                        "on-secondary": "#5e1700",
                        "on-tertiary-container": "#fffdff",
                        "surface-container-high": "#282a2f",
                        "surface": "#111318",
                        "on-background": "#e2e2e8",
                        "inverse-primary": "#3f4cda",
                        "on-secondary-fixed-variant": "#852400"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }

        /* Bottom-edge Ambient Glow focus state (DESIGN.md §5 Input Fields) */
        .input-glow {
            border-bottom: 2px solid transparent;
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-glow:focus {
            outline: none;
            background-color: #282a2f; /* surface-container-high */
            border-bottom-color: #bec2ff; /* primary */
            box-shadow: 0 4px 20px rgba(190, 194, 255, 0.22);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">

    <!-- Ambient void glow — depth layer beneath the card -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[640px] h-[640px] bg-primary-container/5 blur-[140px] rounded-full"></div>
    </div>

    <!-- Frosted Login Card: surface-container-low at 85% on the surface void -->
    <div class="relative w-full max-w-sm z-10">
        <div class="bg-[#191c20]/85 backdrop-blur-2xl rounded-3xl px-10 pt-10 pb-9
                    shadow-[0px_12px_48px_rgba(88,101,242,0.18),0px_2px_8px_rgba(0,0,0,0.5)]
                    relative overflow-hidden">

            <!-- Decorative corner scatter glow -->
            <div class="absolute -top-20 -right-20 w-56 h-56 bg-primary-container/8 blur-[90px] rounded-full pointer-events-none" aria-hidden="true"></div>

            <!-- Brand icon -->
            <div class="flex justify-center mb-7">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center
                            bg-gradient-to-br from-[#5865f2] to-[#bec2ff]
                            shadow-[0px_8px_28px_rgba(88,101,242,0.40)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
            </div>

            <!-- Headline -->
            <h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface text-center leading-none mb-1">
                DiscoBunty
            </h1>
            <p class="text-center text-[11px] text-on-surface-variant font-label uppercase tracking-widest mb-9 opacity-70">
                Command Console · Authenticate
            </p>

            <!-- Error state: error text on surface-container-highest — no red box (DESIGN.md §5) -->
            {% if error %}
            <div class="mb-6 px-4 py-3 bg-[#33353a] rounded-2xl flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#ffb4ab] flex-shrink-0" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span class="text-[#ffb4ab] text-sm font-medium leading-snug">
                    {% if error == 'ratelimit' %}Too many attempts. Please wait a moment.
                    {% elif error == 'no_pass' %}No password configured.
                    {% else %}Invalid password.{% endif %}
                </span>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="post" action="/login" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div>
                    <label class="block text-[10px] font-bold text-[#bec2ff] uppercase tracking-widest mb-2.5">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required
                        autofocus
                        class="input-glow w-full bg-[#0c0e13] rounded-xl py-3.5 px-5
                               text-on-surface text-sm font-body
                               placeholder:text-[#8f8fa0]"
                    >
                </div>

                <!-- Primary CTA: gradient button (DESIGN.md §5 Buttons) -->
                <button
                    type="submit"
                    class="w-full py-3.5 rounded-xl font-headline font-bold text-sm
                           text-[#fffdff] tracking-wide
                           bg-gradient-to-br from-[#5865f2] to-[#bec2ff]
                           hover:opacity-90 active:scale-[0.98]
                           transition-all duration-150
                           shadow-[0px_6px_22px_rgba(88,101,242,0.32)]"
                >
                    Authenticate
                </button>
            </form>

            <!-- Footer -->
            <p class="mt-8 text-center text-[9px] text-[#8f8fa0] uppercase tracking-widest font-label opacity-50">
                DiscoBunty Core · Secure Session
            </p>
        </div>
    </div>

</body>
</html>
