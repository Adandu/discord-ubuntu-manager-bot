<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>DiscoBunty Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --discord-blurple: #5865F2;
            --ubuntu-orange: #E95420;
            --ubuntu-dark: #300a24;
            --bg-dark: #1e1e1e;
            --card-bg: #2b2d31;
            --input-bg: #1e1f22;
            --text-primary: #ffffff;
            --text-secondary: #b5bac1;
            --success: #23a559;
            --danger: #da373c;
            --radius: 8px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--ubuntu-dark);
            background-image: linear-gradient(135deg, var(--ubuntu-dark) 0%, #1e1e1e 100%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--ubuntu-orange);
            font-size: 1.5rem;
        }

        .logout-btn {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--discord-blurple);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"], 
        input[type="number"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border: 1px solid var(--discord-blurple);
        }

        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .switch {
          position: relative;
          display: inline-block;
          width: 50px;
          height: 24px;
        }

        .switch input { 
          opacity: 0;
          width: 0;
          height: 0;
        }

        .slider {
          position: absolute;
          cursor: pointer;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: #4e5058;
          transition: .4s;
          border-radius: 24px;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 18px; width: 18px; left: 3px; bottom: 3px;
          background-color: white;
          transition: .4s;
          border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-primary { background-color: var(--discord-blurple); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-secondary { background-color: #4e5058; color: white; }
        button:hover { opacity: 0.9; }

        .server-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid var(--ubuntu-orange);
            position: relative;
        }

        .server-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        #logs-container {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 4px;
            height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
            white-space: pre-wrap;
            margin-top: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 5% auto;
            padding: 30px;
            border-radius: var(--radius);
            width: 80%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 992px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div style="width: 50px;"></div> <!-- Spacer -->
        <h1>DiscoBunty Control Panel</h1>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="logout-btn" style="background:none; border:none; cursor:pointer;">Logout</button>
        </form>
    </header>

    <div class="container">
        <!-- Core Configuration -->
        <div class="card">
            <h2>Core Settings</h2>
            <form id="coreForm">
                <div class="form-group">
                    <label>Discord Token</label>
                    <input type="password" id="DISCORD_TOKEN" value="{{ config.discord.token or '' }}">
                </div>
                <div class="form-group">
                    <label>Guild ID (Optional)</label>
                    <input type="text" id="GUILD_ID" value="{{ config.discord.guild_id or '' }}">
                </div>
                <div class="form-group">
                    <label>Allowed Roles (Comma separated)</label>
                    <input type="text" id="ALLOWED_ROLES" value="{{ config.discord.allowed_roles or '' }}">
                </div>
                
                <div class="switch-container">
                    <span>Enable Docker Integration</span>
                    <label class="switch">
                        <input type="checkbox" id="ENABLE_DOCKER" {{ 'checked' if config.features.enable_docker == 'true' }}>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="switch-container">
                    <span>Enable Power Control</span>
                    <label class="switch">
                        <input type="checkbox" id="POWER_CONTROL_ENABLED" {{ 'checked' if config.features.power_control_enabled == 'true' }}>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label>Power Control Password</label>
                    <input type="password" id="POWER_CONTROL_PASSWORD" value="{{ config.features.power_control_password or '' }}">
                </div>

                <div class="form-group">
                    <label>WebUI Password</label>
                    <input type="password" id="WEB_PASSWORD" value="{{ config.webui.password or '' }}">
                </div>

                <button type="button" onclick="saveCoreConfig()" class="btn-primary" style="width: 100%;">Save Core Settings</button>
            </form>
        </div>

        <!-- Server Management -->
        <div class="card">
            <h2>
                Servers
                <button onclick="openServerModal()" class="btn-success" style="padding: 5px 15px; font-size: 0.8rem;">+ Add Server</button>
            </h2>
            <div id="serverList"></div>
        </div>

        <!-- Application Logs Section -->
        <div class="card full-width">
            <h2>
                Application Logs
                <div style="font-size: 0.8rem; font-weight: normal; color: var(--text-secondary);">
                    Auto-refreshing every 5 seconds
                </div>
            </h2>
            <div id="logs-container">Loading application logs...</div>
        </div>
    </div>

    <!-- Server Modal -->
    <div id="serverModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Server</h2>
            <form id="serverForm">
                <input type="hidden" id="serverIndex" value="-1">
                <div class="form-group">
                    <label>Alias (Friendly Name)</label>
                    <input type="text" id="srvAlias" required>
                </div>
                <div class="form-group">
                    <label>Hostname / IP</label>
                    <input type="text" id="srvHost" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>User</label>
                        <input type="text" id="srvUser" value="root">
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="srvPort" value="22">
                    </div>
                </div>
                <div class="form-group">
                    <label>Authentication Method</label>
                    <select id="srvAuth" onchange="toggleAuthFields()">
                        <option value="key">SSH Key</option>
                        <option value="password">Password</option>
                    </select>
                </div>
                <div id="passwordField" class="form-group" style="display: none;">
                    <label>Password</label>
                    <input type="password" id="srvPassword">
                </div>
                <div id="keyField" class="form-group">
                    <label>SSH Key (Paste content or path)</label>
                    <textarea id="srvKey" rows="5"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="testServerConnection()" class="btn-secondary" style="flex: 1;">Test Connection</button>
                    <button type="submit" class="btn-success" style="flex: 1;">Save Server</button>
                    <button type="button" onclick="closeServerModal()" class="btn-danger">Cancel</button>
                </div>
                <div id="modalStatus" class="status-msg" style="display:none; padding:10px; border-radius:4px; margin-top:10px;"></div>
            </form>
        </div>
    </div>

    <script>
        let servers = {{ servers | tojson }};
        const config = {{ config | tojson }};
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderServers() {
            const list = document.getElementById('serverList');
            list.innerHTML = '';

            if (servers.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No servers configured.</p>';
            }

            servers.forEach((s, index) => {
                const item = document.createElement('div');
                item.className = 'server-item';
                item.innerHTML = `
                    <strong>${escapeHtml(s.alias)}</strong> (${escapeHtml(s.host)})
                    <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                        User: ${escapeHtml(s.user)} | Port: ${escapeHtml(s.port)} | Auth: ${escapeHtml(s.auth_method)}
                    </div>
                    <div class="server-actions">
                        <button onclick="editServer(${index})" class="btn-primary" style="padding: 5px 10px; font-size: 0.7rem;">Edit</button>
                        <button onclick="deleteServer(${index})" class="btn-danger" style="padding: 5px 10px; font-size: 0.7rem;">Delete</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function openServerModal(index = -1) {
            document.getElementById('serverIndex').value = index;
            document.getElementById('modalStatus').style.display = 'none';
            if (index === -1) {
                document.getElementById('modalTitle').innerText = 'Add Server';
                document.getElementById('serverForm').reset();
                document.getElementById('srvUser').value = 'root';
                document.getElementById('srvPort').value = '22';
            } else {
                const s = servers[index];
                document.getElementById('modalTitle').innerText = 'Edit Server: ' + s.alias;
                document.getElementById('srvAlias').value = s.alias;
                document.getElementById('srvHost').value = s.host;
                document.getElementById('srvUser').value = s.user;
                document.getElementById('srvPort').value = s.port;
                document.getElementById('srvAuth').value = s.auth_method;
                document.getElementById('srvPassword').value = s.password || '';
                document.getElementById('srvKey').value = s.key || '';
            }
            toggleAuthFields();
            document.getElementById('serverModal').style.display = 'block';
        }

        function closeServerModal() {
            document.getElementById('serverModal').style.display = 'none';
        }

        function toggleAuthFields() {
            const method = document.getElementById('srvAuth').value;
            document.getElementById('passwordField').style.display = method === 'password' ? 'block' : 'none';
            document.getElementById('keyField').style.display = method === 'key' ? 'block' : 'none';
        }

        async function testServerConnection() {
            const status = document.getElementById('modalStatus');
            status.style.display = 'block';
            status.style.backgroundColor = 'rgba(255,255,255,0.1)';
            status.innerText = 'Testing connection...';

            const serverData = {
                host: document.getElementById('srvHost').value,
                user: document.getElementById('srvUser').value,
                port: document.getElementById('srvPort').value,
                auth_method: document.getElementById('srvAuth').value,
                password: document.getElementById('srvPassword').value,
                key: document.getElementById('srvKey').value
            };

            try {
                const res = await fetch('/api/test-server', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    body: JSON.stringify(serverData)
                });
                const result = await res.json();
                status.innerText = result.message;
                status.style.backgroundColor = result.success ? 'var(--success)' : 'var(--danger)';
            } catch (e) {
                status.innerText = 'Test failed: ' + e.message;
                status.style.backgroundColor = 'var(--danger)';
            }
        }

        document.getElementById('serverForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const index = parseInt(document.getElementById('serverIndex').value);
            const serverData = {
                alias: document.getElementById('srvAlias').value,
                host: document.getElementById('srvHost').value,
                user: document.getElementById('srvUser').value,
                port: parseInt(document.getElementById('srvPort').value),
                auth_method: document.getElementById('srvAuth').value,
                password: document.getElementById('srvPassword').value,
                key: document.getElementById('srvKey').value
            };

            if (index === -1) {
                servers.push(serverData);
            } else {
                servers[index] = serverData;
            }

            renderServers();
            closeServerModal();
            saveFullConfig();
        });

        function editServer(index) { openServerModal(index); }

        function deleteServer(index) {
            if (confirm('Delete server ' + servers[index].alias + '?')) {
                servers.splice(index, 1);
                renderServers();
                saveFullConfig();
            }
        }

        async function saveCoreConfig() {
            const data = {
                discord: {
                    token: document.getElementById('DISCORD_TOKEN').value,
                    guild_id: document.getElementById('GUILD_ID').value,
                    allowed_roles: document.getElementById('ALLOWED_ROLES').value
                },
                features: {
                    enable_docker: document.getElementById('ENABLE_DOCKER').checked ? 'true' : 'false',
                    power_control_enabled: document.getElementById('POWER_CONTROL_ENABLED').checked ? 'true' : 'false',
                    power_control_password: document.getElementById('POWER_CONTROL_PASSWORD').value
                },
                webui: {
                    enabled: config.webui.enabled,
                    password: document.getElementById('WEB_PASSWORD').value
                },
                servers: servers
            };
            await sendConfig(data);
        }

        async function saveFullConfig() {
            const data = {
                discord: config.discord,
                features: config.features,
                webui: config.webui,
                servers: servers
            };
            if (document.getElementById('DISCORD_TOKEN')) {
                data.discord.token = document.getElementById('DISCORD_TOKEN').value;
                data.discord.guild_id = document.getElementById('GUILD_ID').value;
                data.discord.allowed_roles = document.getElementById('ALLOWED_ROLES').value;
                data.features.enable_docker = document.getElementById('ENABLE_DOCKER').checked ? 'true' : 'false';
                data.features.power_control_enabled = document.getElementById('POWER_CONTROL_ENABLED').checked ? 'true' : 'false';
                data.features.power_control_password = document.getElementById('POWER_CONTROL_PASSWORD').value;
                data.webui.password = document.getElementById('WEB_PASSWORD').value;
            }
            await sendConfig(data);
        }

        async function sendConfig(data) {
            try {
                const res = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    body: JSON.stringify(data)
                });
                if (res.ok) alert('Configuration saved successfully!');
                else alert('Error saving configuration');
            } catch (e) { alert('Connection error'); }
        }

        async function fetchLogs() {
            const logBox = document.getElementById('logs-container');
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                if (data.logs) {
                    const wasNearBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 50;
                    logBox.innerText = data.logs;
                    if (wasNearBottom) logBox.scrollTop = logBox.scrollHeight;
                } else {
                    logBox.innerText = 'Waiting for logs...';
                }
            } catch (e) { console.error('Log fetch error:', e); }
        }

        // Initial render
        renderServers();
        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
