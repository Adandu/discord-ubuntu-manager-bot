services:
  discobunty:
    image: ghcr.io/adandu/discobunty:latest
    # build: . # Uncomment to build locally
    container_name: discobunty
    restart: unless-stopped
    volumes:
      - ./ssh_keys:/app/ssh_keys:ro
    env_file:
      - .env
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - ENABLE_DOCKER=${ENABLE_DOCKER:-false}
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
